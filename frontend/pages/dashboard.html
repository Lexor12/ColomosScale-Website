<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/dashboard.css">
    <title>Dashboard</title>
</head>
<body>
    <aside class="bar">
        <nav class="navbar">
            <div class="navbar__icon">
                <img src="../assets/logo/ic_logo_con_fondo_nav.png" class="navbar__icon__img">
            </div>
            <ul class="navbar__list">
                <li class="navbar__list__element active" id="btnDashboard">
                    <img src="../assets/icons/dashboard.png" class="navbar__list__element__icon navbar__list__element__dashboard">
                    <p>Dashboard</p>
                </li>
                <li class="navbar__list__element" id="btnTecnicos">
                    <img src="../assets/icons/tecnicos.png" class="navbar__list__element__icon navbar__list__element__tecnicos">
                    <p>Técnicos</p>
                </li>
                <li class="navbar__list__element" id="btnLaboratorios">
                    <img src="../assets/icons/laboratorios.png" class="navbar__list__element__icon navbar__list__element__tecnicos">
                    <p>Laboratorios</p>
                </li>
                <li class="navbar__list__element" id="btnAdmin" style="display: none;">
                    <img src="../assets/icons/admin.png" class="navbar__list__element__icon navbar__list__element__admin">
                    <p>Admin</p>
                </li>
            </ul>
            <div class="navbar__about">
                <div class="navbar__about__img">
                    <img src="../assets/icons/user.svg" class="navbar__about__img__element">
                </div>
                <div class="navbar__about__content">
                    <p class="navbar__about__content__name" id="nombreUsuario">Usuario</p>
                    <p class="navbar__about__content__rol" id="rolUsuario">Tecnico</p>
                </div>
            </div>
            <div class="navbar__footer">
                <ul class="footer__list">
                    <li class="navbar__list__element" id="btnSalir">
                        <img src="../assets/icons/salir.png" class="navbar__list__element__icon navbar__list__element__salir">
                        <p>Salir</p>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>
    <main>
        <section class="selector">
            <div class="selector__filtro">
                <input class="selector__filtro__buscador" type="text" placeholder="🔍 Buscar balanza...">
                <select class="selector__filtro__laboratorio" name="laboratorio">
                    <option value="">Todos los laboratorios</option>
                </select>

                <select class="selector__filtro__estado" name="estado">
                    <option value="">Todos los estados</option>
                </select>
            </div>
            <div class="selector__agregar" id="agregarBalanza" style="display: none;">
                <button class="selector__agregar__boton"> + Nueva Balanza</button>
            </div>
        </section>
        <section class="elements">
        </section>
        <section class="modal">
            <article class="modal__editaragregar modal__elemento">
                <div class="modal__elemento__header">
                    <h2 class="modal__elemento__header__titulo modal__editaragregar__header__titulo">Crear Nueva Balanza</h2>
                </div>
                <div class="modal__elemento__formulario modal__editaragregar__formulario"><!--Creado dinamicamente cada input desde JS-->
                    <div class="campo__formulario">
                        <label for="nombre">Nombre de la balanza</label>
                        <input type="text" id="nombre" >
                    </div>
                    <div class="campo__formulario">
                        <label for="marca">Marca de la balanza</label>
                        <input type="text" id="marca" >
                    </div>
                    <div class="campo__formulario">
                        <label for="modelo">Modelo de la balanza</label>
                        <input type="text" id="modelo" >
                    </div>
                    <div class="campo__formulario">
                        <label for="serie">Número de Serie de la balanza</label>
                        <input type="text" id="serie" >
                    </div>
                    <div class="campo__formulario">
                        <label for="img">Nueva imagen de Balanza</label>
                        <input type="file" id="img" >
                    </div>
                    <div class="campo__formulario">
                        <label for="img">Laboratorio de la balanza</label>
                        <select class="campo__formulario__select">
                            
                        </select>
                    </div>
                </div>
                <div class="modal__elemento__botones">
                    <button class="rechazar">Rechazar</button>
                    <button class="aceptar">Aceptar</button>
                </div>
            </article>
        </section>
        <section class="toaster__contenedor">

        </section>
    </main>
</body>
<script src="../js/dashboard.js" type="module"></script>
</html>
