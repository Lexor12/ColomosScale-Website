<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/infoUsuario.css">
    <title>Informacion del usuario</title>
</head>
<body>
    <aside class="bar">
        <nav class="navbar">
            <div class="navbar__icon">
                <img src="../assets/logo/ic_logo_con_fondo_nav.png" class="navbar__icon__img">
            </div>
            <ul class="navbar__list">
                <li class="navbar__list__element" id="btnDashboard">
                    <img src="../assets/icons/dashboard.png" class="navbar__list__element__icon navbar__list__element__dashboard">
                    <p>Dashboard</p>
                </li>
                <li class="navbar__list__element" id="btnTecnicos">
                    <img src="../assets/icons/tecnicos.png" class="navbar__list__element__icon navbar__list__element__tecnicos">
                    <p>Técnicos</p>
                </li>
                <li class="navbar__list__element" id="btnAdmin" style="display: none;">
                    <img src="../assets/icons/admin.png" class="navbar__list__element__icon navbar__list__element__admin">
                    <p>Admin</p>
                </li>
            </ul>
            <div class="navbar__about">
                <div class="navbar__about__img">
                    <img src="../assets/icons/user.svg" class="navbar__about__img__element">
                </div>
                <div class="navbar__about__content">
                    <p class="navbar__about__content__name" id="nombreUsuario">Usuario</p>
                    <p class="navbar__about__content__rol" id="rolUsuario">Tecnico</p>
                </div>
            </div>
            <div class="navbar__footer">
                <ul class="footer__list">
                    <li class="navbar__list__element" id="btnSalir">
                        <img src="../assets/icons/salir.png" class="navbar__list__element__icon navbar__list__element__salir">
                        <p>Salir</p>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>
    <main>
        <section class="selector">
            <div class="selector__filtro">
            </div>
            <div class="selector__volver" id="btnVolver">
                <button class="selector__volver__boton"> > Volver</button>
            </div>
        </section>
        <section class="InfoTecnico">
            <div class="ImagenTecnico">
                <img src="https://files.catbox.moe/j4wvwk.jpg" alt="Imagen del técnico de ejemplo" class="ImagenTecnico__elemento">
            </div>
                <div class="InfoTecnico__reportes">
                    <h2 class="InfoTecnico__reportes__titulo">Historial de reportes</h2>
                </div>
                <div class="InfoTecnico__General">
                    <h3 class="InfoTecnico__General__titulo">Informacion general del usuario</h3>
                    <strong>Nombre: <span class="InfoTecnico__General__nombre"></span></strong>
                    <strong>Correo: <span class="InfoTecnico__General__correo"></span></strong>
                    <strong>Fecha de creacion: <span class="InfoTecnico__General__fecha"></span></strong>
                    <strong>Rol: <span class="InfoTecnico__General__rol"></span></strong>
                </div>
        </section>
    </main>
</body>
<script src="../js/infoUsuario.js"></script>
</html>
