<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/balanza.css">
    <title>Informacion de balanza</title>
</head>
<body>
    <aside class="bar">
        <nav class="navbar">
            <div class="navbar__icon">
                <img src="../assets/logo/ic_logo_con_fondo_nav.png" class="navbar__icon__img">
            </div>
            <ul class="navbar__list">
                <li class="navbar__list__element" id="btnDashboard">
                    <img src="../assets/icons/dashboard.png" class="navbar__list__element__icon navbar__list__element__dashboard">
                    <p>Dashboard</p>
                </li>
                <li class="navbar__list__element" id="btnTecnicos">
                    <img src="../assets/icons/tecnicos.png" class="navbar__list__element__icon navbar__list__element__tecnicos">
                    <p>Técnicos</p>
                </li>
                <li class="navbar__list__element" id="btnAdmin" style="display: none;">
                    <img src="../assets/icons/admin.png" class="navbar__list__element__icon navbar__list__element__admin">
                    <p>Admin</p>
                </li>
            </ul>
            <div class="navbar__about">
                <div class="navbar__about__img">
                    <img src="../assets/icons/user.svg" class="navbar__about__img__element">
                </div>
                <div class="navbar__about__content">
                    <p class="navbar__about__content__name" id="nombreUsuario">Usuario</p>
                    <p class="navbar__about__content__rol" id="rolUsuario">Tecnico</p>
                </div>
            </div>
            <div class="navbar__footer">
                <ul class="footer__list">
                    <li class="navbar__list__element" id="btnSalir">
                        <img src="../assets/icons/salir.png" class="navbar__list__element__icon navbar__list__element__salir">
                        <p>Salir</p>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>
    <main>
        <section class="selector">
            <div class="selector__filtro">
            </div>
            <div class="selector__volver" id="btnVolver">
                <button class="selector__volver__boton"> > Volver</button>
            </div>
        </section>
        <section class="InfoBalanza">
            <div class="ImagenBalanza">
                <img src="https://files.catbox.moe/mhx3ck.png" alt="Imagen de la balanza de ejemplo" id="ImagenBalanzaContenido">
            </div>
                <div class="InfoBalanza__datos">
                    <h2 class="InfoBalanza__datos__titulo">Información de la balanza</h2>
                    <p class="InfoBalanza__datos__elemento"><strong>Nombre: </strong><span id="balanzaNombre"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Marca: </strong><span id="balanzaMarca"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Modelo: </strong><span id="balanzaModelo"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Serie: </strong><span id="balanzaSerie"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Laboratorio:</strong><span id="balanzaLaboratorio"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Codigo: </strong><span id="balanzaCodigo"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Estado: </strong><span id="balanzaEstado"></span></p>
                    <p class="InfoBalanza__datos__elemento"><strong>Última medición: </strong><span id="balanzaUltimaMedición"></span></p>
                </div>
                <div class="InfoBalanza__BotonEditar">
                    <button class="selector__editar__boton" style="display: none;">Editar Información</button>
                </div>
                <div class="InfoBalanza__datos InfoBalanza__historial">
                    <h2 class="HistorialReportes__titulo">Historial de reportes</h2>
                    <div class="HistorialReportes__lista">
                    </div>
                </div>
        </section>
        <section class="modal">
            <article class="modal__editaragregar modal__elemento">
                <div class="modal__elemento__header">
                    <h2 class="modal__elemento__header__titulo modal__editaragregar__header__titulo">Crear Nueva Balanza</h2>
                </div>
                <div class="modal__elemento__formulario modal__editaragregar__formulario"><!--Creado dinamicamente cada input desde JS-->
                    <div class="campo__formulario">
                        <label for="nombre">Nombre de la balanza</label>
                        <input type="text" id="nombre" >
                    </div>
                    <div class="campo__formulario">
                        <label for="marca">Marca de la balanza</label>
                        <input type="text" id="marca" >
                    </div>
                    <div class="campo__formulario">
                        <label for="modelo">Modelo de la balanza</label>
                        <input type="text" id="modelo" >
                    </div>
                    <div class="campo__formulario">
                        <label for="serie">Número de Serie de la balanza</label>
                        <input type="text" id="serie" >
                    </div>
                    <div class="campo__formulario">
                        <label for="img">Nueva imagen de Balanza</label>
                        <input type="file" id="img" >
                    </div>
                    <div class="campo__formulario">
                        <label for="img">Laboratorio de la balanza</label>
                        <select class="campo__formulario__select">
                        </select>
                    </div>
                </div>
                <div class="modal__elemento__botones">
                    <button class="rechazar">Rechazar</button>
                    <button class="aceptar">Aceptar</button>
                </div>
            </article>
        </section>
        <section class="toaster__contenedor">
            <!--
            <div class="toaster__contenedor__elemento toast-correcto">
                <div>
                    <img src="../assets/icons/icon_correcto.png" width="45px">
                </div>
                <p class="toaster__contenedor__elemento__info">Todo a sucedido correctamente</p>
            </div>
            <div class="toaster__contenedor__elemento toast-error">
                <div>
                    <img src="../assets/icons/icon_error.png" width="45px">
                </div>
                <p class="toaster__contenedor__elemento__info">Todo a sucedido correctamente ejemplo ejemplo ejemplo ejemplo ejemplo ejemplo ejemplo ejemploejemplo ejemplo ejemplo ejemplo</p>
            </div>
            <div class="toaster__contenedor__elemento toast-info">
                <div>
                    <img src="../assets/icons/icon_info.png" width="45px">
                </div>
                <p class="toaster__contenedor__elemento__info">Todo a sucedido correctamente</p>
            </div>
            -->
        </section>
    </main>
</body>
<script src="../js/balanza.js" type="module"></script>
</html>
