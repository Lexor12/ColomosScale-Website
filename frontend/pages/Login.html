<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColomosScale</title>
    <link href="../css/login.css" rel="stylesheet" type="text/css" media="all">
</head>
<body>
    <aside class="hero">
        <p>Todas tus balanzas,<br><i>gestionadas en un sólo lugar</i><br><br><n>*</n></p>
    </aside>
    <main class="right-panel"> 
            <div class="wrapper">
            <div><img src="../assets/logo/logo_completo.jpeg" alt="ColomosScale" height="220px" width="auto"></div>
            <h2>Bienvenido de vuelta</h2><br>
            <form>
                <input id="inputUsername" type="text" placeholder="Username" required maxlength="48">
                <input id="inputPass" type="password" placeholder="Contraseña" required maxlength="256">
                <button id="btn" type="submit">Iniciar sesión</button>
            </form>
            <p id="mensaje-error" style="color: red; text-align: center; display: none;">Usuario no existente, compruebe sus credenciales.</p>
    </div>
    </main>
</body>
<script src="../js/login.js"></script>
</html>
