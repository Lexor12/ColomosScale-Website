<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/laboratorios.css">
    <title>Técnicos</title>
</head>
<body>
    <aside class="bar">
        <nav class="navbar">
            <div class="navbar__icon">
                <img src="../assets/logo/ic_logo_con_fondo_nav.png" class="navbar__icon__img">
            </div>
            <ul class="navbar__list">
                <li class="navbar__list__element" id="btnDashboard">
                    <img src="../assets/icons/dashboard.png" class="navbar__list__element__icon navbar__list__element__dashboard">
                    <p>Dashboard</p>
                </li>
                <li class="navbar__list__element" id="btnTecnicos">
                    <img src="../assets/icons/tecnicos.png" class="navbar__list__element__icon navbar__list__element__tecnicos">
                    <p>Técnicos</p>
                </li>
                <li class="navbar__list__element active" id="btnLaboratorios">
                    <img src="../assets/icons/laboratorios.png" class="navbar__list__element__icon navbar__list__element__tecnicos">
                    <p>Laboratorios</p>
                </li>
                <li class="navbar__list__element" id="btnAdmin" style="display: none;">
                    <img src="../assets/icons/admin.png" class="navbar__list__element__icon navbar__list__element__admin">
                    <p>Admin</p>
                </li>
            </ul>
            <div class="navbar__about">
                <div class="navbar__about__img">
                    <img src="../assets/icons/user.svg" class="navbar__about__img__element">
                </div>
                <div class="navbar__about__content">
                    <p class="navbar__about__content__name" id="nombreUsuario">Usuario</p>
                    <p class="navbar__about__content__rol" id="rolUsuario">Tecnico</p>
                </div>
            </div>
            <div class="navbar__footer">
                <ul class="footer__list">
                    <li class="navbar__list__element" id="btnSalir">
                        <img src="../assets/icons/salir.png" class="navbar__list__element__icon navbar__list__element__salir">
                        <p>Salir</p>
                    </li>
                </ul>
            </div>
        </nav>
    </aside>
    <main>
        <section class="selector">
            <div class="selector__filtro">
                <input class="selector__filtro__buscador" type="text" placeholder="🔍 Buscar laboratorio por nombre...">
            </div>
        </section>
        <section class="elements">
            <article class="elements__header" >
                <p>Nombre</p>
                <p>Ubicación</p>
                <p>Número de balanzas asociadas</p>
            </article>
            <div>
                <article class="elements__lab" style="grid-template-columns: 1fr;">
                    <p class="elements__lab__elemento elements__lab__elemento--NumBalanzas">No hay laboratorios registrados.</p>
                </article>
                <!--<article class="elements__lab" >
                <p class="elements__lab__elemento elements__lab__elemento--Nombre ">Laboratorio Principal Jijija</p>
                <p class="elements__lab__elemento elements__lab__elemento--Ubicacion">Se encuentra justo por debajo de donde se encuentra el otro laboratorio que esta a la vuelta de la esquina Se encuentra justo por debajo de donde se encuentra el otro laboratorio que esta a la vuelta de la esquina.</p>
                <p class="elements__lab__elemento elements__lab__elemento--NumBalanzas">10</p>
            </article>-->
            </div>
        </section>
        <section class="toaster__contenedor">
        </section>
    </main>
</body>
<script src="../js/laboratorios.js" type="module"></script>
</html>
